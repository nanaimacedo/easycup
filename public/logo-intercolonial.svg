<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Tsuru (origami crane) -->
  <g transform="translate(100, 20)">
    <!-- Body -->
    <polygon points="100,0 180,80 200,140 140,120 80,140 0,80" fill="#00AEEF" stroke="#007BB5" stroke-width="2"/>
    <!-- Wing left -->
    <polygon points="0,80 -20,40 60,60 100,0" fill="#00AEEF" stroke="#007BB5" stroke-width="1.5"/>
    <!-- Wing right -->
    <polygon points="200,140 240,60 180,80 100,0" fill="#29B6F6" stroke="#007BB5" stroke-width="1.5"/>
    <!-- Tail -->
    <polygon points="0,80 -40,100 40,110 80,140" fill="#0097D7" stroke="#007BB5" stroke-width="1.5"/>
    <!-- Head/beak -->
    <polygon points="200,140 230,130 220,150" fill="#007BB5"/>
    <!-- Inner fold lines -->
    <line x1="100" y1="0" x2="100" y2="100" stroke="#007BB5" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="60" x2="180" y2="80" stroke="#007BB5" stroke-width="1" opacity="0.3"/>
    <line x1="80" y1="140" x2="140" y2="120" stroke="#007BB5" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- 78º -->
  <text x="280" y="110" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#333" stroke="#333" stroke-width="1">78</text>
  <text x="365" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#333">º</text>
  <!-- 2026 -->
  <text x="30" y="250" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#00AEEF" stroke="#005F8A" stroke-width="2" transform="rotate(-15, 60, 240)">2026</text>
  <!-- INTERCOLONIAL -->
  <text x="110" y="270" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#222" letter-spacing="2">INTERCOLONIAL</text>
</svg>
